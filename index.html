<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Bedhead Flow Reveal</title>
    
    <!-- Load p5.js and Crimson Pro Font -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Strict global sizing to prevent any overflow or shifting */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0; 
            background-color: #ffffff; 
            font-family: 'Crimson Pro', serif;
            font-weight: 300; 
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            width: 100%; 
            max-width: 100vw;
            overflow: hidden; 
        }

        /* Screen Transitions */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden; 
            position: relative;
        }

        .screen.active {
            display: flex;
        }

        /* Subtle Export Button */
        #export-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Crimson Pro', serif;
            font-size: 14px;
            color: #888888;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e6e0d8;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
        }

        #export-btn:hover {
            color: #000000;
            border-color: #000000;
        }

        /* Pure HTML/CSS Staggered Logo */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Crimson Pro', serif;
            font-weight: 300; 
            line-height: 0.8;
            user-select: none;
        }

        .logo-large {
            font-size: 100px;
            margin-bottom: 20px;
        }
        .logo-large .l-bad { transform: translateX(-5px) rotate(-4deg); }
        .logo-large .l-bed { transform: translateX(-25px) rotate(3deg); }
        .logo-large .l-head { transform: translateX(18px) rotate(-3deg); }

        .logo-small {
            font-size: 32px; 
            margin-top: 20px;
            margin-bottom: 0px;
            align-self: center;
        }
        .logo-small .l-bad { transform: translateX(-2px) rotate(-4deg); }
        .logo-small .l-bed { transform: translateX(-10px) rotate(3deg); }
        .logo-small .l-head { transform: translateX(8px) rotate(-3deg); }

        .l-bad { color: #b45743; display: inline-block; z-index: 3; }
        .l-bed { color: #1e8eb4; display: inline-block; font-style: normal; z-index: 2; }
        .l-head { color: #000000; display: inline-block; z-index: 1; }

        /* Screen 1 specific elements */
        #screen-1 {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 300; 
            margin-top: 40px;
            margin-bottom: 80px;
            color: #222;
        }

        .interact-btn {
            font-family: 'Crimson Pro', serif;
            font-size: 18px;
            color: #1e8eb4;
            text-decoration: underline;
            text-underline-offset: 6px;
            cursor: pointer;
            font-weight: 300;
            background: none;
            border: none;
            padding: 10px;
            outline: none;
        }

        /* Screen 2 specific elements */
        #app-container {
            position: relative;
            flex-grow: 1; 
            min-height: 0;
            background-color: transparent; 
            width: 100%;
            overflow: hidden;
            touch-action: none; 
        }

        canvas {
            display: block;
            touch-action: none;
            outline: none;
        }

        /* -----------------------------------------------------------------
           PANEL 1: DATA DISPLAY (Floating visibly upwards)
        ----------------------------------------------------------------- */
        #data-panel {
            position: absolute;
            bottom: 95px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px; 
            opacity: 0; 
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 20;
        }

        #data-panel.active {
            opacity: 1;
        }

        .date-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }

        #box-day {
            font-size: 22px;
            font-weight: 400;
            color: #000000;
            line-height: 1.2;
        }

        #box-sh {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.2;
            margin-top: 2px;
        }

        .shower-yes { color: #1e8eb4; } 
        .shower-no { color: #b45743; } 

        .stats-row {
            display: flex;
            flex-direction: row;
            justify-content: space-around; 
            width: 100%;
            padding: 0 10px;
        }
        
        .stat-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-lbl {
            font-size: 15px;
            color: #000000;
            font-weight: 300;
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 400; 
            color: #000000; 
        }

        /* -----------------------------------------------------------------
           PANEL 2: INSTRUCTION TEXT (Locked to the bottom)
        ----------------------------------------------------------------- */
        #instruction-panel {
            position: absolute;
            bottom: 25px; 
            left: 0;
            width: 100%;
            font-size: 15px;
            color: #1e8eb4;
            font-weight: 300;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <!-- SCREEN 1: Landing Page -->
    <div id="screen-1" class="screen active">
        <div class="logo-container logo-large">
            <span class="l-bad">bad</span>
            <span class="l-bed">bed</span>
            <span class="l-head">head</span>
        </div>
        <p class="subtitle">An Autoethnographic Study of Hair, Habit, and Sleep</p>
        <button id="start-btn" class="interact-btn">Interact with the Data</button>
    </div>

    <!-- SCREEN 2: Interactive Visualization -->
    <div id="screen-2" class="screen">
        <button id="export-btn">Download 4K</button>

        <div class="logo-container logo-small">
            <span class="l-bad">bad</span>
            <span class="l-bed">bed</span>
            <span class="l-head">head</span>
        </div>

        <div id="app-container">
            <!-- p5 canvas injects here -->
        </div>

        <!-- Panel 1: Data Display (Raised) -->
        <div id="data-panel">
            <div class="date-row">
                <span id="box-day">25/3</span>
                <span id="box-sh" class="shower-no">No Shower</span>
            </div>
            
            <div class="stats-row">
                <div class="stat-col">
                    <span class="stat-lbl">Quality</span>
                    <span class="stat-val" id="box-qual">1</span>
                </div>
                <div class="stat-col">
                    <span class="stat-lbl">Volume</span>
                    <span class="stat-val" id="box-vol">2</span>
                </div>
                <div class="stat-col">
                    <span class="stat-lbl">Neatness</span>
                    <span class="stat-val" id="box-neat">2</span>
                </div>
            </div>
        </div>

        <!-- Panel 2: Instruction Text (Bottom) -->
        <div id="instruction-panel">
            Tap on the Hair Strands to read the data
        </div>

    </div>

    <script>
        // 21 Days of Data
        const rawData = [
            { day: 25, sh: 0, qual: 1, vol: 2, neat: 2 },
            { day: 26, sh: 1, qual: 2, vol: 2, neat: 1 },
            { day: 27, sh: 0, qual: 1, vol: 1, neat: 3 },
            { day: 28, sh: 0, qual: 3, vol: 3, neat: 1 },
            { day: 29, sh: 0, qual: 1, vol: 2, neat: 2 },
            { day: 30, sh: 0, qual: 1, vol: 1, neat: 1 },
            { day: 31, sh: 0, qual: 1, vol: 1, neat: 3 },
            { day: 1,  sh: 0, qual: 2, vol: 2, neat: 2 },
            { day: 2,  sh: 1, qual: 3, vol: 3, neat: 1 },
            { day: 3,  sh: 0, qual: 2, vol: 2, neat: 2 },
            { day: 4,  sh: 0, qual: 3, vol: 3, neat: 1 },
            { day: 5,  sh: 0, qual: 1, vol: 2, neat: 1 },
            { day: 6,  sh: 0, qual: 2, vol: 2, neat: 3 },
            { day: 7,  sh: 1, qual: 1, vol: 2, neat: 1 },
            { day: 8,  sh: 0, qual: 2, vol: 1, neat: 2 },
            { day: 9,  sh: 0, qual: 2, vol: 1, neat: 3 },
            { day: 10, sh: 0, qual: 3, vol: 1, neat: 3 },
            { day: 11, sh: 0, qual: 3, vol: 1, neat: 2 },
            { day: 12, sh: 0, qual: 1, vol: 2, neat: 1 },
            { day: 13, sh: 1, qual: 1, vol: 3, neat: 1 },
            { day: 14, sh: 0, qual: 2, vol: 2, neat: 2 } 
        ];

        const dates = [
            "25/3", "26/3", "27/3", "28/3", "29/3", "30/3", "31/3", 
            "1/4", "2/4", "3/4", "4/4", "5/4", "6/4", "7/4", 
            "8/4", "9/4", "10/4", "11/4", "12/4", "13/4", "14/4"
        ];

        // Palette Colors
        const C_BEIGE = '#e6e0d8'; 
        const C_RUST  = '#b45743';
        const C_TEAL  = '#1e8eb4';
        const C_BLACK = '#222222'; 

        // Virtual Coordinate System
        const vW = 1000, vH = 1000;
        const cx = vW / 2, cy = vH / 2;
        
        let R_hole = 40; 
        let R1 = 133;
        let R2 = 226;
        let R3 = 320; 
        let radiiMap = { 1: R1, 2: R2, 3: R3 };
        
        let days = [];
        let selectedIndex = null;
        let container;
        let scaleF = 1; 
        let isExporting = false;

        // UI Event Listeners
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('screen-1').classList.remove('active');
            document.getElementById('screen-2').classList.add('active');
            windowResized(); 
        });

        // 4K Export Logic
        document.getElementById('export-btn').addEventListener('click', () => {
            let currentW = width;
            let currentH = height;
            
            isExporting = true; 
            resizeCanvas(4000, 4000); 
            draw(); 
            
            saveCanvas('bad_bed_head_visualization', 'png');
            
            isExporting = false; 
            resizeCanvas(currentW, currentH);
            draw();
        });

        function setup() {
            container = document.getElementById('app-container');
            let canvas = createCanvas(container.clientWidth, container.clientHeight);
            canvas.parent('app-container');

            textFont('Crimson Pro');
            curveTightness(-0.25); 

            let centralAngle = TWO_PI / 21;

            let q_ang = -HALF_PI + TWO_PI/6;     
            let v_ang = -HALF_PI + 3*TWO_PI/6;   
            let n_ang = -HALF_PI + 5*TWO_PI/6;   

            for (let i = 0; i < 21; i++) {
                let d = rawData[i];
                let a_base = -HALF_PI + i * centralAngle; 
                
                let dQ = min((a_base - q_ang + TWO_PI) % TWO_PI, (q_ang - a_base + TWO_PI) % TWO_PI);
                let dV = min((a_base - v_ang + TWO_PI) % TWO_PI, (v_ang - a_base + TWO_PI) % TWO_PI);
                let dN = min((a_base - n_ang + TWO_PI) % TWO_PI, (n_ang - a_base + TWO_PI) % TWO_PI);

                let param1, param2, param3;
                if (dQ <= dV && dQ <= dN) {
                    param1 = 'vol'; param2 = 'neat'; param3 = 'qual';
                } else if (dV <= dQ && dV <= dN) {
                    param1 = 'neat'; param2 = 'qual'; param3 = 'vol';
                } else {
                    param1 = 'qual'; param2 = 'vol'; param3 = 'neat';
                }

                let a0 = a_base;
                let a1 = a_base + TWO_PI / 3;
                let a2 = a_base + 2 * TWO_PI / 3;
                let a3 = a_base + TWO_PI; 

                // Deformed Control Points
                let pts_deformed = [];
                pts_deformed.push(createVector(cx + (R_hole - 20) * cos(a0 - 0.5), cy + (R_hole - 20) * sin(a0 - 0.5)));
                pts_deformed.push(createVector(cx + R_hole * cos(a0), cy + R_hole * sin(a0)));
                pts_deformed.push(createVector(cx + radiiMap[d[param1]] * cos(a1), cy + radiiMap[d[param1]] * sin(a1))); 
                pts_deformed.push(createVector(cx + radiiMap[d[param2]] * cos(a2), cy + radiiMap[d[param2]] * sin(a2)));
                pts_deformed.push(createVector(cx + radiiMap[d[param3]] * cos(a3), cy + radiiMap[d[param3]] * sin(a3)));
                pts_deformed.push(createVector(cx + (radiiMap[d[param3]] + 40) * cos(a3 + 0.5), cy + (radiiMap[d[param3]] + 40) * sin(a3 + 0.5)));

                // Straight Control Points
                let pts_straight = [];
                let r_step = (R3 - R_hole) / 3; 
                pts_straight.push(createVector(cx + (R_hole - 20) * cos(a_base), cy + (R_hole - 20) * sin(a_base)));
                pts_straight.push(createVector(cx + R_hole * cos(a_base), cy + R_hole * sin(a_base)));
                pts_straight.push(createVector(cx + (R_hole + r_step * 1) * cos(a_base), cy + (R_hole + r_step * 1) * sin(a_base)));
                pts_straight.push(createVector(cx + (R_hole + r_step * 2) * cos(a_base), cy + (R_hole + r_step * 2) * sin(a_base)));
                pts_straight.push(createVector(cx + R3 * cos(a_base), cy + R3 * sin(a_base)));
                pts_straight.push(createVector(cx + (R3 + 40) * cos(a_base), cy + (R3 + 40) * sin(a_base)));

                // OPTIMIZATION: Pre-calculate the geometry for EVERY microstroke.
                // This completely removes expensive spline math from the drawing loop.
                let strokes = [];
                let numStrokes = 1500; 
                
                for (let j = 0; j < numStrokes; j++) {
                    let u = 1 - Math.random(); 
                    let v = Math.random();
                    let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                    
                    let t = Math.random();
                    
                    // Evaluate standard Spline math once during setup
                    let ptS = getSplinePoint(pts_straight, t);
                    let tanS = getSplineTangent(pts_straight, t);
                    
                    let ptD = getSplinePoint(pts_deformed, t);
                    let tanD = getSplineTangent(pts_deformed, t);
                    
                    let envelope = Math.sin(t * Math.PI); // Cache sine envelope

                    strokes.push({
                        t: t, 
                        offsetNorm: z * 0.25, 
                        halfLen: random(3, 8) / 2, 
                        phase: random(TWO_PI),
                        env: envelope,
                        ptS: ptS,
                        tanS: tanS,
                        ptD: ptD,
                        tanD: tanD
                    });
                }

                days.push({
                    data: d,
                    dateString: dates[i],
                    a_base: a_base,
                    strokes: strokes,
                    animProgress: 0
                });
            }
        }

        function windowResized() {
            if (container && document.getElementById('screen-2').classList.contains('active')) {
                resizeCanvas(container.clientWidth, container.clientHeight);
            }
        }

        // Catmull-Rom Spline Math Helpers
        function getSplinePoint(pts, t) {
            let numSegments = pts.length - 3; 
            let segment = Math.floor(t * numSegments);
            if (segment >= numSegments) segment = numSegments - 1;
            let localT = (t * numSegments) - segment;

            let p0 = pts[segment], p1 = pts[segment + 1], p2 = pts[segment + 2], p3 = pts[segment + 3];

            let x = curvePoint(p0.x, p1.x, p2.x, p3.x, localT);
            let y = curvePoint(p0.y, p1.y, p2.y, p3.y, localT);
            return createVector(x, y);
        }

        function getSplineTangent(pts, t) {
            let t1 = t;
            let t2 = t + 0.001;
            if (t2 > 1) { t1 = t - 0.001; t2 = t; }
            let pt1 = getSplinePoint(pts, t1);
            let pt2 = getSplinePoint(pts, t2);
            let dx = pt2.x - pt1.x;
            let dy = pt2.y - pt1.y;
            let mag = Math.sqrt(dx*dx + dy*dy) || 1;
            return createVector(dx/mag, dy/mag);
        }

        function drawPolygon(radius, faint) {
            stroke(color(0, 0, 0, faint ? 20 : 60)); 
            strokeWeight(faint ? 0.8 : 1.2);
            noFill();
            beginShape();
            for (let i = 0; i < 21; i++) {
                let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                vertex(cx + radius * Math.cos(vAngle), cy + radius * Math.sin(vAngle));
            }
            endShape(CLOSE);
        }

        function draw() {
            if (!document.getElementById('screen-2').classList.contains('active')) return;

            clear();
            background(255);
            
            // Increased scale for massive chart presence
            scaleF = Math.min(width / vW, height / vH) * 1.05; 

            // Offset to prevent overlapping data panel on mobile
            let currentYOffset = isExporting ? 0 : -80;

            push();
            translate(width / 2, (height / 2) + currentYOffset);
            scale(scaleF);
            translate(-cx, -cy);

            fill(color(C_BEIGE));
            drawPolygon(R3, false); 
            beginShape();
            for (let i = 0; i < 21; i++) {
                let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                vertex(cx + R3 * Math.cos(vAngle), cy + R3 * Math.sin(vAngle));
            }
            endShape(CLOSE);

            drawPolygon(R_hole, true);

            noFill();
            [R1, R2].forEach(r => drawPolygon(r, true));

            stroke(color(0, 0, 0, 20));
            strokeWeight(1.2);
            let sectorAngles = [
                -HALF_PI, 
                -HALF_PI + 7 * TWO_PI / 21, 
                -HALF_PI + 14 * TWO_PI / 21
            ];
            for(let a of sectorAngles) {
                line(cx + R_hole * Math.cos(a), cy + R_hole * Math.sin(a), cx + R3 * Math.cos(a), cy + R3 * Math.sin(a));
            }

            let fontScale = constrain(scaleF, 0.3, 1.0);
            
            // Render Strands
            for (let i = 0; i < 21; i++) {
                if (i !== selectedIndex) renderStrand(i, false);
            }
            if (selectedIndex !== null) {
                renderStrand(selectedIndex, true);
            }

            // Only draw text if not exporting to 4k
            if (!isExporting) {
                drawingContext.textAlign = "center";
                drawingContext.textBaseline = "middle";
                drawingContext.fillStyle = "rgba(0, 0, 0, 0.6)";
                
                drawingContext.font = "300 " + (15 / fontScale) + "px 'Crimson Pro'";
                
                // Massive distance away from the strands to prevent overlap
                let sectorLabelRadius = R3 + 120; 
                
                // Quality (Top Right)
                push();
                translate(cx + sectorLabelRadius * Math.cos(-HALF_PI + TWO_PI/6), cy + sectorLabelRadius * Math.sin(-HALF_PI + TWO_PI/6));
                drawingContext.fillText("Quality", 0, 0);
                pop();

                // Volume (Bottom Center)
                push();
                translate(cx + sectorLabelRadius * Math.cos(HALF_PI), cy + sectorLabelRadius * Math.sin(HALF_PI));
                drawingContext.fillText("Volume", 0, 0);
                pop();

                // Neatness (Top Left)
                push();
                translate(cx + sectorLabelRadius * Math.cos(-HALF_PI + 5*TWO_PI/6), cy + sectorLabelRadius * Math.sin(-HALF_PI + 5*TWO_PI/6));
                drawingContext.fillText("Neatness", 0, 0);
                pop();

                // Outer Day Dates (Moved cleanly outward)
                for (let i = 0; i < 21; i++) {
                    let d = days[i];
                    let lx = cx + (R3 + 60) * Math.cos(d.a_base); 
                    let ly = cy + (R3 + 60) * Math.sin(d.a_base);
                    
                    if (i === selectedIndex) {
                        drawingContext.fillStyle = "rgb(0, 0, 0)";
                        drawingContext.font = "400 " + (14 / fontScale) + "px 'Crimson Pro'";
                    } else {
                        drawingContext.fillStyle = "rgba(0, 0, 0, 0.4)"; 
                        drawingContext.font = "300 " + (10 / fontScale) + "px 'Crimson Pro'";
                    }
                    drawingContext.fillText(d.dateString, lx, ly);
                }
            }

            pop();
        }

        // HIGHLY OPTIMIZED RENDER PIPELINE
        function renderStrand(index, isSelected) {
            let day = days[index];

            // Smooth Selection Animation
            let targetProgress = isSelected ? 1 : 0;
            
            // Performance optimization: prevent endless micro-lerping if mostly finished
            if (Math.abs(day.animProgress - targetProgress) < 0.005) {
                day.animProgress = targetProgress;
            } else {
                day.animProgress += (targetProgress - day.animProgress) * 0.08;
            }

            let animProg = day.animProgress;

            let baseColor;
            if (isSelected) {
                baseColor = day.data.sh === 1 ? color(C_TEAL) : color(C_RUST);
                baseColor.setAlpha(255); 
            } else {
                baseColor = color(C_BLACK);
                baseColor.setAlpha(25); 
            }
            
            stroke(baseColor);
            strokeWeight(0.6); 
            noFill();
            
            // Extremely fast batch drawing
            beginShape(LINES);

            let fCount = frameCount * 0.04;
            
            for (let s of day.strokes) {
                // OPTIMIZATION: Linearly interpolate between the pre-cached Spline states!
                // This removes 100,000+ complex Math operations per frame.
                let ptX = s.ptS.x + (s.ptD.x - s.ptS.x) * animProg;
                let ptY = s.ptS.y + (s.ptD.y - s.ptS.y) * animProg;

                let tanX = s.tanS.x + (s.tanD.x - s.tanS.x) * animProg;
                let tanY = s.tanS.y + (s.tanD.y - s.tanS.y) * animProg;

                // Re-normalize tangent after lerping
                let mag = Math.sqrt(tanX*tanX + tanY*tanY) || 1;
                tanX /= mag;
                tanY /= mag;

                let nx = -tanY;
                let ny = tanX;

                let turbulence = 0;
                // Optimization: Do not compute turbulence if the strand is not deformed
                if (animProg > 0.01) {
                    turbulence = Math.sin(s.t * TWO_PI * 4 - fCount + s.phase) * (15 * animProg * s.env);
                }
                
                let spreadWidth = 48 * s.env; 
                let finalOffset = (s.offsetNorm * spreadWidth) + turbulence;

                let cxPos = ptX + nx * finalOffset;
                let cyPos = ptY + ny * finalOffset;

                vertex(cxPos - tanX * s.halfLen, cyPos - tanY * s.halfLen);
                vertex(cxPos + tanX * s.halfLen, cyPos + tanY * s.halfLen);
            }
            
            endShape();
        }

        function mousePressed() {
            if (!document.getElementById('screen-2').classList.contains('active')) return true;
            if (mouseY < 50) return true; // prevent canvas interaction when tapping export button
            if (mouseY > height - 150) return true; // prevent interacting through the data panel

            let currentYOffset = isExporting ? 0 : -80;

            let mx = (mouseX - width / 2) / scaleF + cx;
            let my = (mouseY - ((height / 2) + currentYOffset)) / scaleF + cy;

            let dToCenter = dist(mx, my, cx, cy);
            
            let apothem = R3 * Math.cos(PI / 21);
            if (dToCenter < apothem + 30 && dToCenter > R_hole - 10) {
                let mouseAngle = Math.atan2(my - cy, mx - cx);
                let adjustedAngle = mouseAngle + HALF_PI;
                if (adjustedAngle < 0) adjustedAngle += TWO_PI;
                
                let sliceWidth = TWO_PI / 21;
                let clickedIndex = Math.floor((adjustedAngle + sliceWidth / 2) / sliceWidth) % 21;

                if (selectedIndex !== clickedIndex) {
                    selectedIndex = clickedIndex;
                    updateInfoBox(clickedIndex);
                } else {
                    selectedIndex = null;
                    document.getElementById('data-panel').classList.remove('active');
                }
            } else {
                selectedIndex = null;
                document.getElementById('data-panel').classList.remove('active');
            }
            
            return false;
        }

        function updateInfoBox(index) {
            let d = days[index];
            
            document.getElementById('box-day').innerText = d.dateString;
            
            let shEl = document.getElementById('box-sh');
            if(d.data.sh === 1) {
                shEl.innerText = 'Shower';
                shEl.className = 'shower-yes';
            } else {
                shEl.innerText = 'No Shower';
                shEl.className = 'shower-no';
            }

            document.getElementById('box-qual').innerText = d.data.qual;
            document.getElementById('box-vol').innerText = d.data.vol;
            document.getElementById('box-neat').innerText = d.data.neat;

            document.getElementById('data-panel').classList.add('active');
        }
    </script>
</body>
</html>
