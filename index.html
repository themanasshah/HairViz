<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile specific meta tags to prevent zooming and ensure proper app-like scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Bedhead Flow Reveal</title>
    
    <!-- Load p5.js and ONLY Crimson Pro Font -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* This variable dynamically tracks the canvas zoom to perfectly scale the HTML */
            --scaleF: 1;
        }

        body {
            margin: 0;
            padding: 0; 
            background-color: #ffffff; 
            font-family: 'Crimson Pro', serif;
            font-weight: 300; 
            box-sizing: border-box;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
        }

        /* Screen Transitions */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .screen.active {
            display: flex;
        }

        /* Staggered Logo Styling */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.75;
            font-family: 'Crimson Pro', serif;
            font-weight: 300; /* Set to Light */
        }

        .logo-large {
            font-size: 72px;
            margin-bottom: 30px;
        }

        .logo-small {
            font-size: 32px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .l-bad { color: #b45743; transform: rotate(-3deg) translateX(15px); z-index: 3; }
        .l-bed { color: #1e8eb4; font-style: italic; transform: rotate(4deg) translateX(-15px); z-index: 2; }
        .l-head { color: #000000; transform: rotate(-2deg) translateX(20px); z-index: 1; }

        /* Screen 1 specific elements */
        #screen-1 {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 400;
            margin-top: 40px;
            margin-bottom: 80px;
            color: #222;
        }

        .interact-btn {
            font-family: 'Crimson Pro', serif;
            font-size: 18px;
            color: #1e8eb4;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            font-weight: 400;
            background: none;
            border: none;
            padding: 10px;
        }

        /* Screen 2 specific elements */
        #app-container {
            position: relative;
            flex-grow: 1;
            background-color: transparent; 
            width: 100%;
            overflow: hidden;
            touch-action: none; 
        }

        footer {
            text-align: center;
            padding: 20px;
            flex-shrink: 0;
            font-size: 15px;
            color: #1e8eb4;
            font-weight: 400;
        }

        canvas {
            display: block;
            touch-action: none;
            outline: none;
        }

        /* Centered Information Display */
        #info-box {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Perfectly scaled to match the 1000x1000 virtual canvas coordinates */
            width: 220px; 
            height: 220px;
            text-align: center;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            
            /* Transforms dynamically bind to CSS variable updated by JS */
            transform: translate(-50%, -50%) scale(calc(var(--scaleF) * 0.85));
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #info-box.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(var(--scaleF));
        }

        .info-header {
            font-size: 34px;
            font-weight: 400; 
            color: #000000; 
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .shower-indicator {
            display: inline-block;
            font-size: 16px;
            font-weight: 400; 
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .shower-yes { color: #1e8eb4; } 
        .shower-no { color: #b45743; } 

        .data-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
            width: 100%;
        }
        
        .data-row:last-child { margin-bottom: 0; }
        .data-val { font-weight: 600; color: #000000; }

    </style>
</head>
<body>

    <!-- SCREEN 1: Landing Page -->
    <div id="screen-1" class="screen active">
        <div class="logo-container logo-large">
            <span class="l-bad">bad</span>
            <span class="l-bed">bed</span>
            <span class="l-head">head</span>
        </div>
        <p class="subtitle">An Autoethnographic Study of Hair, Habit, and Sleep</p>
        <button id="start-btn" class="interact-btn">Interact with the data</button>
    </div>

    <!-- SCREEN 2: Interactive Visualization -->
    <div id="screen-2" class="screen">
        <div class="logo-container logo-small">
            <span class="l-bad">bad</span>
            <span class="l-bed">bed</span>
            <span class="l-head">head</span>
        </div>

        <div id="app-container">
            <!-- p5 canvas injects here -->
            
            <div id="info-box">
                <div class="info-header" id="box-day">25/3</div>
                <div id="box-sh" class="shower-indicator"></div>
                
                <div class="data-row">
                    <span>Quality</span>
                    <span class="data-val" id="box-qual">-</span>
                </div>
                <div class="data-row">
                    <span>Volume</span>
                    <span class="data-val" id="box-vol">-</span>
                </div>
                <div class="data-row">
                    <span>Neatness</span>
                    <span class="data-val" id="box-neat">-</span>
                </div>
            </div>
        </div>

        <footer>
            Tap on the hair strands to read the data
        </footer>
    </div>

    <script>
        // 21 Days of Data
        const rawData = [
            { day: 25, sh: 0, qual: 1, vol: 2, neat: 2 },
            { day: 26, sh: 1, qual: 2, vol: 2, neat: 1 },
            { day: 27, sh: 0, qual: 1, vol: 1, neat: 3 },
            { day: 28, sh: 0, qual: 3, vol: 3, neat: 1 },
            { day: 29, sh: 0, qual: 1, vol: 2, neat: 2 },
            { day: 30, sh: 0, qual: 1, vol: 1, neat: 1 },
            { day: 31, sh: 0, qual: 1, vol: 1, neat: 3 },
            { day: 1,  sh: 0, qual: 2, vol: 2, neat: 2 },
            { day: 2,  sh: 1, qual: 3, vol: 3, neat: 1 },
            { day: 3,  sh: 0, qual: 2, vol: 2, neat: 2 },
            { day: 4,  sh: 0, qual: 3, vol: 3, neat: 1 },
            { day: 5,  sh: 0, qual: 1, vol: 2, neat: 1 },
            { day: 6,  sh: 0, qual: 2, vol: 2, neat: 3 },
            { day: 7,  sh: 1, qual: 1, vol: 2, neat: 1 },
            { day: 8,  sh: 0, qual: 2, vol: 1, neat: 2 },
            { day: 9,  sh: 0, qual: 2, vol: 1, neat: 3 },
            { day: 10, sh: 0, qual: 3, vol: 1, neat: 3 },
            { day: 11, sh: 0, qual: 3, vol: 1, neat: 2 },
            { day: 12, sh: 0, qual: 1, vol: 2, neat: 1 },
            { day: 13, sh: 1, qual: 1, vol: 3, neat: 1 },
            { day: 14, sh: 0, qual: 2, vol: 2, neat: 2 } 
        ];

        const dates = [
            "25/3", "26/3", "27/3", "28/3", "29/3", "30/3", "31/3", 
            "1/4", "2/4", "3/4", "4/4", "5/4", "6/4", "7/4", 
            "8/4", "9/4", "10/4", "11/4", "12/4", "13/4", "14/4"
        ];

        // Palette Colors
        const C_BEIGE = '#e2ded6';
        const C_RUST  = '#b45743';
        const C_TEAL  = '#1e8eb4';
        const C_BLACK = '#666666'; 

        // Virtual Coordinate System (remains fixed at 1000x1000 for internal math)
        const vW = 1000, vH = 1000;
        const cx = vW / 2, cy = vH / 2;
        
        // Slightly larger center to perfectly accommodate the 220px bounding box
        let R_hole = 160; 
        let R1 = 230;
        let R2 = 300;
        let R3 = 370; 
        let radiiMap = { 1: R1, 2: R2, 3: R3 };
        
        let days = [];
        let selectedIndex = null;
        let infoBox;
        let container;
        let scaleF = 1; // Tracks current dynamic zoom

        // Navigation Logic
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('screen-1').classList.remove('active');
            document.getElementById('screen-2').classList.add('active');
            // Recalculate layout once element is visible
            windowResized();
        });

        function setup() {
            container = document.getElementById('app-container');
            let canvas = createCanvas(container.clientWidth, container.clientHeight);
            canvas.parent('app-container');
            infoBox = document.getElementById('info-box');

            textFont('Crimson Pro');
            curveTightness(-0.25); 

            let centralAngle = TWO_PI / 21;

            let q_ang = -HALF_PI + TWO_PI/6;     
            let v_ang = -HALF_PI + 3*TWO_PI/6;   
            let n_ang = -HALF_PI + 5*TWO_PI/6;   

            for (let i = 0; i < 21; i++) {
                let d = rawData[i];
                let a_base = -HALF_PI + i * centralAngle; 
                
                let dQ = min((a_base - q_ang + TWO_PI) % TWO_PI, (q_ang - a_base + TWO_PI) % TWO_PI);
                let dV = min((a_base - v_ang + TWO_PI) % TWO_PI, (v_ang - a_base + TWO_PI) % TWO_PI);
                let dN = min((a_base - n_ang + TWO_PI) % TWO_PI, (n_ang - a_base + TWO_PI) % TWO_PI);

                let param1, param2, param3;
                if (dQ <= dV && dQ <= dN) {
                    param1 = 'vol'; param2 = 'neat'; param3 = 'qual';
                } else if (dV <= dQ && dV <= dN) {
                    param1 = 'neat'; param2 = 'qual'; param3 = 'vol';
                } else {
                    param1 = 'qual'; param2 = 'vol'; param3 = 'neat';
                }

                let a0 = a_base;
                let a1 = a_base + TWO_PI / 3;
                let a2 = a_base + 2 * TWO_PI / 3;
                let a3 = a_base + TWO_PI; 

                let pts_deformed = [];
                pts_deformed.push(createVector(cx + (R_hole - 30) * cos(a0 - 0.5), cy + (R_hole - 30) * sin(a0 - 0.5)));
                pts_deformed.push(createVector(cx + R_hole * cos(a0), cy + R_hole * sin(a0)));
                pts_deformed.push(createVector(cx + radiiMap[d[param1]] * cos(a1), cy + radiiMap[d[param1]] * sin(a1))); 
                pts_deformed.push(createVector(cx + radiiMap[d[param2]] * cos(a2), cy + radiiMap[d[param2]] * sin(a2)));
                pts_deformed.push(createVector(cx + radiiMap[d[param3]] * cos(a3), cy + radiiMap[d[param3]] * sin(a3)));
                pts_deformed.push(createVector(cx + (radiiMap[d[param3]] + 40) * cos(a3 + 0.5), cy + (radiiMap[d[param3]] + 40) * sin(a3 + 0.5)));

                let pts_straight = [];
                let r_step = (R3 - R_hole) / 3; 
                pts_straight.push(createVector(cx + (R_hole - 30) * cos(a_base), cy + (R_hole - 30) * sin(a_base)));
                pts_straight.push(createVector(cx + R_hole * cos(a_base), cy + R_hole * sin(a_base)));
                pts_straight.push(createVector(cx + (R_hole + r_step * 1) * cos(a_base), cy + (R_hole + r_step * 1) * sin(a_base)));
                pts_straight.push(createVector(cx + (R_hole + r_step * 2) * cos(a_base), cy + (R_hole + r_step * 2) * sin(a_base)));
                pts_straight.push(createVector(cx + R3 * cos(a_base), cy + R3 * sin(a_base)));
                pts_straight.push(createVector(cx + (R3 + 40) * cos(a_base), cy + (R3 + 40) * sin(a_base)));

                let strokes = [];
                let numStrokes = 800; 
                
                for (let j = 0; j < numStrokes; j++) {
                    let u = 1 - Math.random(); 
                    let v = Math.random();
                    let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                    
                    strokes.push({
                        t: Math.random(), 
                        offsetNorm: z * 0.25, 
                        len: random(3, 8), 
                        phase: random(TWO_PI)
                    });
                }

                days.push({
                    data: d,
                    dateString: dates[i],
                    a_base: a_base,
                    pts_deformed: pts_deformed,
                    pts_straight: pts_straight,
                    strokes: strokes,
                    animProgress: 0
                });
            }
        }

        function windowResized() {
            if (container && document.getElementById('screen-2').classList.contains('active')) {
                resizeCanvas(container.clientWidth, container.clientHeight);
            }
        }

        function getSplinePoint(pts, t) {
            let numSegments = pts.length - 3; 
            let segment = Math.floor(t * numSegments);
            if (segment >= numSegments) segment = numSegments - 1;
            let localT = (t * numSegments) - segment;

            let p0 = pts[segment];
            let p1 = pts[segment + 1];
            let p2 = pts[segment + 2];
            let p3 = pts[segment + 3];

            let x = curvePoint(p0.x, p1.x, p2.x, p3.x, localT);
            let y = curvePoint(p0.y, p1.y, p2.y, p3.y, localT);
            return createVector(x, y);
        }

        function getSplineTangent(pts, t) {
            let t1 = t;
            let t2 = t + 0.001;
            if (t2 > 1) {
                t1 = t - 0.001;
                t2 = t;
            }
            let pt1 = getSplinePoint(pts, t1);
            let pt2 = getSplinePoint(pts, t2);
            let dx = pt2.x - pt1.x;
            let dy = pt2.y - pt1.y;
            let mag = sqrt(dx*dx + dy*dy) || 1;
            return createVector(dx/mag, dy/mag);
        }

        function drawPolygon(radius, faint) {
            stroke(color(255, 255, 255, faint ? 100 : 200)); 
            strokeWeight(faint ? 0.8 : 1.5);
            noFill();
            beginShape();
            for (let i = 0; i < 21; i++) {
                let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                vertex(cx + radius * cos(vAngle), cy + radius * sin(vAngle));
            }
            endShape(CLOSE);
        }

        function draw() {
            if (!document.getElementById('screen-2').classList.contains('active')) return;

            clear();
            background(255);
            
            // Calculate dynamic mobile scaling
            scaleF = Math.min(width / vW, height / vH) * 0.95;
            
            // Pass the exact scale back to the CSS so the HTML overlay size matches flawlessly
            document.documentElement.style.setProperty('--scaleF', scaleF);

            push();
            translate(width / 2, height / 2);
            scale(scaleF);
            translate(-cx, -cy);

            // 1. Draw solid Beige Icosagon base
            fill(color(C_BEIGE));
            stroke(color(0, 0, 0, 15)); 
            strokeWeight(1);
            beginShape();
            for (let i = 0; i < 21; i++) {
                let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                vertex(cx + R3 * cos(vAngle), cy + R3 * sin(vAngle));
            }
            endShape(CLOSE);

            // 2. Draw Center White Hole 
            fill(255);
            noStroke();
            beginShape();
            for (let i = 0; i < 21; i++) {
                let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                vertex(cx + R_hole * cos(vAngle), cy + R_hole * sin(vAngle));
            }
            endShape(CLOSE);

            // 3. Draw faint interior guide rings
            noFill();
            stroke(color(0, 0, 0, 12));
            strokeWeight(1);
            [R1, R2].forEach(r => {
                beginShape();
                for (let i = 0; i < 21; i++) {
                    let vAngle = -HALF_PI + (i - 0.5) * (TWO_PI / 21);
                    vertex(cx + r * cos(vAngle), cy + r * sin(vAngle));
                }
                endShape(CLOSE);
            });

            let fontScale = constrain(scaleF, 0.3, 1.0);
            
            // 4. Render Strands
            for (let i = 0; i < 21; i++) {
                if (i !== selectedIndex) renderStrand(i, false);
            }
            if (selectedIndex !== null) {
                renderStrand(selectedIndex, true);
            }

            // 5. Outer Day Labels
            drawingContext.textAlign = "center";
            drawingContext.textBaseline = "middle";
            for (let i = 0; i < 21; i++) {
                let d = days[i];
                let lx = cx + (R3 + 35) * cos(d.a_base); 
                let ly = cy + (R3 + 35) * sin(d.a_base);
                
                if (i === selectedIndex) {
                    drawingContext.fillStyle = "rgb(0, 0, 0)";
                    drawingContext.font = "400 " + (15 / fontScale) + "px 'Crimson Pro'";
                } else {
                    drawingContext.fillStyle = "rgba(0, 0, 0, 0.7)"; 
                    drawingContext.font = "300 " + (12 / fontScale) + "px 'Crimson Pro'";
                }
                drawingContext.fillText(d.dateString, lx, ly);
            }

            pop();
        }

        function renderStrand(index, isSelected) {
            let day = days[index];

            let targetProgress = isSelected ? 1 : 0;
            day.animProgress = lerp(day.animProgress, targetProgress, 0.08); 

            let curPts = [];
            for (let i = 0; i < day.pts_straight.length; i++) {
                curPts.push(p5.Vector.lerp(day.pts_straight[i], day.pts_deformed[i], day.animProgress));
            }

            let baseColor;
            if (isSelected) {
                baseColor = day.data.sh === 1 ? color(C_TEAL) : color(C_RUST);
                baseColor.setAlpha(255); 
            } else {
                baseColor = color(C_BLACK);
                baseColor.setAlpha(45);  
            }
            
            stroke(baseColor);
            strokeWeight(0.6); 
            noFill();
            
            beginShape(LINES);

            for (let s of day.strokes) {
                let t = s.t;

                let pt = getSplinePoint(curPts, t);
                let tan = getSplineTangent(curPts, t);
                let nx = -tan.y;
                let ny = tan.x;

                let envelope = sin(t * PI); 

                let turbulenceMag = 15 * day.animProgress * envelope;
                let turbulence = sin(t * TWO_PI * 4 - frameCount * 0.05 + s.phase) * turbulenceMag;
                
                let spreadWidth = (48 + 0 * day.animProgress) * envelope; 
                let finalOffset = (s.offsetNorm * spreadWidth) + turbulence;

                let cxPos = pt.x + nx * finalOffset;
                let cyPos = pt.y + ny * finalOffset;

                let halfLen = s.len / 2;
                
                vertex(cxPos - tan.x * halfLen, cyPos - tan.y * halfLen);
                vertex(cxPos + tan.x * halfLen, cyPos + tan.y * halfLen);
            }
            
            endShape();
        }

        function mousePressed() {
            if (!document.getElementById('screen-2').classList.contains('active')) return true;

            let mx = (mouseX - width / 2) / scaleF + cx;
            let my = (mouseY - height / 2) / scaleF + cy;

            let dToCenter = dist(mx, my, cx, cy);
            
            let apothem = R3 * cos(PI / 21);
            if (dToCenter < apothem + 20 && dToCenter > R_hole - 10) {
                let mouseAngle = atan2(my - cy, mx - cx);
                let adjustedAngle = mouseAngle + HALF_PI;
                if (adjustedAngle < 0) adjustedAngle += TWO_PI;
                
                let sliceWidth = TWO_PI / 21;
                let clickedIndex = floor((adjustedAngle + sliceWidth / 2) / sliceWidth) % 21;

                if (selectedIndex !== clickedIndex) {
                    selectedIndex = clickedIndex;
                    updateInfoBox(clickedIndex);
                } else {
                    selectedIndex = null;
                    infoBox.classList.remove('active');
                }
            } else {
                selectedIndex = null;
                infoBox.classList.remove('active');
            }
            
            return false;
        }

        function updateInfoBox(index) {
            let d = days[index];
            
            document.getElementById('box-day').innerText = d.dateString;
            
            let shEl = document.getElementById('box-sh');
            if(d.data.sh === 1) {
                shEl.innerText = 'Shower';
                shEl.className = 'shower-indicator shower-yes';
            } else {
                shEl.innerText = 'No shower';
                shEl.className = 'shower-indicator shower-no';
            }

            document.getElementById('box-qual').innerText = d.data.qual;
            document.getElementById('box-vol').innerText = d.data.vol;
            document.getElementById('box-neat').innerText = d.data.neat;

            infoBox.classList.add('active');
        }
    </script>
</body>
</html>
